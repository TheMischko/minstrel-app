<div class="playlist-page-container">
  <h1>Playlists</h1>
  <div class="playlists-wrapper">
    <ul>
      @for(playlist of playlistStore.entities(); track playlist.id){
      <li>{{ playlist.id }} - {{ playlist.title }}</li>
      }
    </ul>
  </div>
  <div class="actions-row">
    <app-button color="primary" (click)="updatePlaylists()">
      Update
    </app-button>
  </div>
  <div>
    <app-edit-playlist-form></app-edit-playlist-form>
  </div>
</div>
